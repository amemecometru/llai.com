<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LogicLemon AI — AI workflows for your Google Workspace. Stop drowning in busywork." />
    <meta name="theme-color" content="#FAF7F0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0D0A" media="(prefers-color-scheme: dark)" />
    <title>LogicLemon AI — Stop drowning in Workspace</title>

    <!-- DESIGN.md tokens: Inter Tight (display), Inter (body), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- FOUC-prevention: theme set before paint -->
    <script>
      (function(){try{var t=localStorage.getItem('logiclemon-theme');var theme=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',theme);document.documentElement.classList.toggle('dark',theme==='dark');}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
